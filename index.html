<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawaria Global Directory - Loading...</title>
    <!-- Redirección automática después de 2.5 segundos -->
    <meta http-equiv="refresh" content="2.5;url=search.html">
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
        }

        /* Spinner animado */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #3f51b5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #a0cfff;
        }

        .status-text {
            font-size: 0.9rem;
            color: #888;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Botón de respaldo por si falla la redirección */
        .manual-link {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #3f51b5;
            text-decoration: none;
            border: 1px solid #3f51b5;
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .manual-link:hover {
            background: #3f51b5;
            color: white;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h1>DRAWARIA WIKI SEARCH LITE...</h1>
        <p class="status-text">Loading...</p>
        
        <!-- JavaScript de respaldo para redirección inmediata -->
        <script>
            setTimeout(function() {
                window.location.href = "search.html";
            }, 2000);
        </script>

        <a href="search.html" class="manual-link">Click here if not redirected</a>
    </div>

</body>
</html>
