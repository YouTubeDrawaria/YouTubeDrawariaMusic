function advancedDecancer(str) {
    if (!str) return "";
    let result = "";
    // Normalización de ancho completo (Full-width)
    for (let char of str) {
        let code = char.codePointAt(0);
        if (code >= 0xFF21 && code <= 0xFF3A) { result += String.fromCodePoint(code - 0xFEE0); continue; }
        if (code >= 0xFF41 && code <= 0xFF5A) { result += String.fromCodePoint(code - 0xFEE0); continue; }
        result += char;
    }
    result = result.normalize("NFKD");
    let translated = "";
    for (let c of result) { translated += gamerMap[c] || c; }
    return translated.normalize("NFKD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/gi, '').toLowerCase();
}

function getYearFromUUID(uid) {
    if (!uid) return null;
    const parts = uid.split('-');
    if (parts.length === 5 && parts[2].startsWith('1')) {
        const timeHex = parts[2].substring(1) + parts[1] + parts[0];
        try {
            const timeInt = BigInt("0x" + timeHex);
            const gregorianOffset = 122192928000000000n;
            const timestampMs = Number((timeInt - gregorianOffset) / 10000n);
            return new Date(timestampMs).getFullYear();
        } catch(e) { return null; }
    }
    return null;
}

/* CÓDIGO DEL WORKER PARA CREAR LA BASE DE DATOS DE BÚSQUEDA */
const searchWorkerCode = `
self.onmessage = async function(e) {
    const { profilesArr, socialArr, hiddenArr } = e.data;
    const DB_NAME = "DrawariaSearchDB";
    const request = indexedDB.open(DB_NAME, 1);

    request.onerror = (err) => self.postMessage({ status: "Error DB: " + err });

    request.onsuccess = function(event) {
        const db = event.target.result;
        const tx = db.transaction("search_profiles", "readwrite");
        const store = tx.objectStore("search_profiles");

        self.postMessage({ status: "Cross-referencing data..." });

        const userSet = new Map();
        const hiddenMap = new Map();

        if(hiddenArr) hiddenArr.forEach(h => hiddenMap.set(h.owner_uid, h.friends ? h.friends.length : 0));

        if(profilesArr) {
            profilesArr.forEach(p => {
                userSet.set(p.uid, { uid: p.uid, name: p.name, new_name: p.new_name, hasHiddenFriends: false });
            });
        }

        if(socialArr) {
            socialArr.forEach(s => {
                if (!userSet.has(s.owner_uid)) userSet.set(s.owner_uid, { uid: s.owner_uid, name: s.owner_name || "Unknown", new_name: s.new_name || null, hasHiddenFriends: false });
                const originalFriendsCount = hiddenMap.get(s.owner_uid) || 0;
                if (originalFriendsCount === 0 && s.friends && s.friends.length > 0) userSet.get(s.owner_uid).hasHiddenFriends = true;
            });
        }

        const allDataArray = Array.from(userSet.values());
        self.postMessage({ status: "Saving " + allDataArray.length + " profiles to IndexedDB..." });

        allDataArray.forEach((p, i) => {
            store.put(p);
            if (i % 5000 === 0) {
                self.postMessage({ status: "Profiles saved: " + Math.round((i/allDataArray.length)*100) + "%" });
            }
        });

        tx.oncomplete = () => {
            db.close();
            self.postMessage({ status: "¡Completo!", complete: true });
        };
    };
};
`;

    checkDB.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('search_profiles')) {
            db.createObjectStore("search_profiles", { keyPath: "uid" });
        }
    };
    
    checkDB.onsuccess = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('search_profiles')) {
            document.getElementById('setup-view').style.display = 'flex';
            return;
        }
        
        const transaction = db.transaction(['search_profiles'], 'readonly');
        const store = transaction.objectStore('search_profiles');
        const countReq = store.count();

        countReq.onsuccess = () => {
            if (countReq.result > 0) {
                document.getElementById('setup-view').style.display = 'none';

async function loadDataIntoMemory() {
    const status = document.getElementById('total-stats');
    if(status) status.innerHTML = "Loading data into memory for fast search... <i class='fas fa-spinner fa-spin'></i>";

    const request = indexedDB.open("DrawariaSearchDB", 1);
    request.onsuccess = (e) => {
        const db = e.target.result;
        const tx = db.transaction("search_profiles", "readonly");
        const store = tx.objectStore("search_profiles");
        
        store.getAll().onsuccess = (ev) => {
            allData = ev.target.result ||[];
            
            // Procesar cache en bloque (rápido en RAM)
            advancedCache = allData.map(u => advancedDecancer((u.name || "") + " " + (u.new_name || "")));
            
            if(status) status.innerHTML = `Profiles And Friends loaded from DB. <b>${allData.length.toLocaleString()}</b> Added. Enjoy browsing!`;
            applyFilters();
        };
    };
}

function applyFilters() {
    const query = document.getElementById('da-search-input').value.trim();
    const method = document.getElementById('da-search-method').value;
    const onlyAltered = document.getElementById('alter-names-cb').checked;
    const onlyHidden = document.getElementById('has-hidden-cb').checked;
    const onlyModerators = document.getElementById('show-moderators-cb').checked;
    const onlyLead = document.getElementById('show-lead-cb').checked && onlyModerators;
    const selectedYear = availableYears[currentYearIndex];

    let temp = [];
    let tempCache =[];

    for (let i = 0; i < allData.length; i++) {
        const p = allData[i];
        
        if (selectedYear !== "All Years") {
            if (getYearFromUUID(p.uid) !== selectedYear) continue;
        }

        const isAltered = p.new_name && (p.new_name !== p.name);
        const isMod = moderatorsData.hasOwnProperty(p.uid);
        const isLeadUser = isMod && moderatorsData[p.uid].isLead;
        
        if (onlyAltered || onlyHidden || onlyModerators) {
            const matchAltered = onlyAltered && isAltered;
            const matchHidden = onlyHidden && p.hasHiddenFriends;
            let matchMod = false;
            if (onlyModerators) matchMod = onlyLead ? isLeadUser : isMod;
            
            if (!(matchAltered || matchHidden || matchMod)) continue;
        }

        if (query !== "") {
            if (method === 'name') {
                if (!advancedCache[i].includes(advancedDecancer(query))) continue;
            } else {
                if (!p.uid.toLowerCase().includes(query.toLowerCase())) continue;
            }
        }
        
        temp.push(p);
        tempCache.push(advancedCache[i]);
    }

    filteredData = temp;
    currentIndex = 0;
    document.getElementById('friends-list-wrapper').innerHTML = '';
    renderChunk();
}

const domains =[
    'https://cdn1.tusitio.com',
    'https://cdn2.tusitio.com',
    'https://assets.global.com',
    'https://img-cache.net'
];

function renderChunk() {
    const board = document.getElementById('friends-list-wrapper');
    const showAlterView = document.getElementById('alter-names-cb').checked;
    const showLeadToggled = document.getElementById('show-lead-cb').checked;
    
    const nextBatch = filteredData.slice(currentIndex, currentIndex + itemsToShow);
    if (currentIndex === 0 && nextBatch.length === 0) {
        board.innerHTML = '<div style="color:white; padding: 20px; text-align:center; font-weight:bold; width:100%;">No matches found.</div>';
        document.getElementById('load-more-btn').style.display = 'none';
        document.getElementById('load-all-btn').style.display = 'none';
        return;
    }

    let html = '';
    const fallBackImg = "this.onerror=null;this.src='user.png';";

    nextBatch.forEach(f => {
        const isMod = moderatorsData.hasOwnProperty(f.uid);
        const isAltered = f.new_name && (f.new_name !== f.name);
        const displayFname = (showAlterView && isAltered) ? f.new_name : f.name;
        const profileUrl = `profile.html?uid=${f.uid}&search_name=${encodeURIComponent(displayFname)}`;
        
        let auraClass = '';
        let badges =[];
        if (isAltered) badges.push('<span class="altered-badge">ALTERED</span>');
        if (f.hasHiddenFriends) badges.push('<span class="hidden-badge">HIDDEN</span>');
        
        if (isMod) {
            const modInfo = moderatorsData[f.uid];
            if (showLeadToggled && modInfo.isLead) {
                badges.push('<span class="lead-badge">LEAD-MODERATOR</span>');
                auraClass = 'lead-aura';
            } else {
                badges.push('<span class="mod-badge">MODERATOR</span>');
                auraClass = 'mod-aura';
            }
        }

        let badgesHTML = badges.length > 1 ? `<div class="badge-stack">${badges.join('')}</div>` : (badges[0] ? `<span style="margin-left:8px; vertical-align:middle;">${badges[0]}</span>` : '');

        const modSecName = (isMod) ? `<div style="font-size:0.85em; color:#f1c40f; font-weight:bold; margin-bottom: 3px;">Title: ${moderatorsData[f.uid].alter}</div>` : '';
        const secNameHtml = (f.new_name && f.new_name !== f.name) ? `<div style="font-size:0.85em; color:#bbb; font-weight:bold; margin-bottom: 3px;"> ${showAlterView ? f.name : f.new_name}</div>` : '';

        // FIX DEL BUG AL GENERAR RANDOM DOMAINS CON EL STRING UID
        let hash = 0;
        for (let i = 0; i < f.uid.length; i++) {
            hash += f.uid.charCodeAt(i);
        }
        const randomDomain = domains[hash % domains.length];

        html += `
        <div class="friendcard col-sm-12 col-md-6 col-lg-3 ${auraClass}">
            <img class="friend-avatar" 
                 src="avatar/${f.uid}.webp" 
                 loading="lazy" 
                 onerror="${fallBackImg}" 
                 onclick="window.location.href='${profileUrl}'">
            
            <a href="${profileUrl}" class="friend-link">
                <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%;">${displayFname}</span>
                ${badgesHTML}
            </a>

            <div class="friend-tooltip">
                <div class="tt-name">${displayFname}</div>
                ${modSecName}
                ${secNameHtml}
                <img class="tt-img" src="avatar/${f.uid}.webp" loading="lazy" onerror="${fallBackImg}">
                <div class="tt-uid">uid=${f.uid}</div>
            </div>
        </div>`;
    }); // FIX PRINCIPAL: Agregado el Cierre del forEach que generaba SyntaxError (missing ) after argument list)

    if (currentIndex === 0) board.innerHTML = html;
    else board.insertAdjacentHTML('beforeend', html);

    currentIndex += itemsToShow;
    
    if (currentIndex < filteredData.length) {
        if (!isAutoScrollActive) {
            document.getElementById('load-more-btn').style.display = 'block';
            document.getElementById('load-all-btn').style.display = 'block';
        }
    } else {
        document.getElementById('load-more-btn').style.display = 'none';
        document.getElementById('load-all-btn').style.display = 'none';
        isAutoScrollActive = false;
    }
};
