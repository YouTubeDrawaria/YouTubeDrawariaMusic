// INICIALIZACIÓN ESTRICTA Y DB (Solo muestra DB Installer si está vacía)
// ============================================================================
let localDB; 

window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('uid');
    if (!targetUid) {
        document.getElementById('friends-list-wrapper').innerHTML = '<div style="color:white; padding:20px;">No UID provided.</div>';
        return;
    }

    const checkDB = indexedDB.open("DrawariaLiteDB", 2);
    
    checkDB.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("profiles")) db.createObjectStore("profiles", { keyPath: "uid" });
        if (!db.objectStoreNames.contains("social")) db.createObjectStore("social", { keyPath: "owner_uid" });
        if (!db.objectStoreNames.contains("sigint_tags")) db.createObjectStore("sigint_tags", { keyPath: "word" });
    };
    
    checkDB.onsuccess = e => {
        localDB = e.target.result;
        if (!localDB.objectStoreNames.contains('profiles')) {
            document.getElementById('setup-view').style.display = 'flex';
            return;
        }
        
        const transaction = localDB.transaction(['profiles'], 'readonly');
        const store = transaction.objectStore('profiles');
        const countReq = store.count();

        countReq.onsuccess = () => {
            if (countReq.result === 0) {
                document.getElementById('setup-view').style.display = 'flex';
            } else {
                initFriendsPage(targetUid);
            }
        };
    };
});

/* LÓGICA DEL WORKER DE IMPORTACIÓN */
const workerCode = `
self.onmessage = async function(e) {
    const { profiles, social } = e.data;
    const DB_NAME = "DrawariaLiteDB";
    const request = indexedDB.open(DB_NAME, 2);
    request.onsuccess = function(event) {
        const db = event.target.result;
        const pTx = db.transaction("profiles", "readwrite");
        const pStore = pTx.objectStore("profiles");
        profiles.forEach((p, i) => {
            pStore.put(p);
            if (i % 2000 === 0) self.postMessage({ status: "Profiles: " + Math.round((i/profiles.length)*100) + "%" });
        });
        pTx.oncomplete = () => {
            const sTx = db.transaction("social", "readwrite");
            const sStore = sTx.objectStore("social");
            social.forEach((s, i) => {
                sStore.put(s);
                if (i % 2000 === 0) self.postMessage({ status: "Social: " + Math.round((i/social.length)*100) + "%" });
            });
            sTx.oncomplete = () => {
                db.close();
                self.postMessage({ status: "All complete!", complete: true });
            };
        };
    };
};`;

document.getElementById('btn-worker').onclick = async function() {
    const btn = this; const status = document.getElementById('status-text'); const fill = document.getElementById('progress-fill');
    btn.disabled = true;
    const loadScript = (src) => new Promise(res => { const s = document.createElement('script'); s.src = src; s.onload = res; document.head.appendChild(s); });
    try {
        status.innerText = "Downloading chunks..."; fill.style.width = "15%"; fill.innerText = "15%";
        await loadScript('relational_profiles_v5.js'); fill.style.width = "35%"; fill.innerText = "35%";
        await loadScript('relational_social_v5.js'); fill.style.width = "50%"; fill.innerText = "50%";
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        const worker = new Worker(workerUrl);
        worker.postMessage({ profiles: window.relationalProfiles, social: window.relationalSocialMaps });
        worker.onmessage = (e) => {
            if (e.data.complete) { 
                fill.style.width = "100%"; fill.innerText = "100%"; 
                status.innerText = "Success! Reloading..."; setTimeout(() => location.reload(), 1200); 
            } else { 
                const match = e.data.status.match(/(\d+)%/); 
                if (match) {
                    let p = 50 + (parseInt(match[1]) / 2);
                    fill.style.width = p + "%"; fill.innerText = Math.round(p) + "%";
                }
                status.innerText = e.data.status; 
            }
        };
    } catch (err) { status.innerText = "Error: " + err.message; btn.disabled = false; }
};

function advancedDecancer(str) {
    if (!str) return "";
    let result = "";
    for (let char of str) {
        let code = char.codePointAt(0);
        if (code >= 0xFF21 && code <= 0xFF3A) { result += String.fromCodePoint(code - 0xFEE0); continue; }
        if (code >= 0xFF41 && code <= 0xFF5A) { result += String.fromCodePoint(code - 0xFEE0); continue; }
        if (code >= 0x24B6 && code <= 0x24CF) { result += String.fromCodePoint(code - 0x24B6 + 65); continue; }
        if (code >= 0x24D0 && code <= 0x24E9) { result += String.fromCodePoint(code - 0x24D0 + 97); continue; }
        if (code >= 0x1F150 && code <= 0x1F169) { result += String.fromCodePoint(code - 0x1F150 + 65); continue; }
        if (code >= 0x1F130 && code <= 0x1F149) { result += String.fromCodePoint(code - 0x1F130 + 65); continue; }
        if (code >= 0x1F170 && code <= 0x1F189) { result += String.fromCodePoint(code - 0x1F170 + 65); continue; }
        result += char;
    }
    result = result.normalize("NFKD");
    let translated = "";
    for (let c of result) { translated += gamerMap[c] || c; }
    return translated.normalize("NFKD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/gi, '').toLowerCase();
}

function extractUid(f) {
    if (!f) return "";
    if (typeof f === 'string') return f;
    if (Array.isArray(f)) return f[0] || "";
    if (typeof f === 'object') return f.uid || f.id || "";
    return String(f);
}

function extractName(f) {
    if (!f) return "Unknown";
    if (typeof f === 'string') return "Unknown";
    if (Array.isArray(f)) return f[1] || f[0] || "Unknown";
    if (typeof f === 'object') return f.name || f.username || f.uid || "Unknown";
    return String(f);
}

function extractNewName(f) {
    if (!f) return null;
    if (typeof f === 'object') return f.new_name || null;
    return null;
}

let globalFriendsList =[]; 
let currentFilteredList = [];
let advancedCache =[]; 
let searchTimeout;
let showAlterNames = false;

// ============================================================================
// MAIN PAGE INIT
// ============================================================================
function initFriendsPage(targetUid) {
    const urlParams = new URLSearchParams(window.location.search);
    
    // Header Data
    try {
        const getProfile = localDB.transaction("profiles", "readonly").objectStore("profiles").get(targetUid);
        getProfile.onsuccess = () => {
            const profile = getProfile.result;
            if (profile) {
                window.currentPlayerProfile = profile; 

                const searchedName = urlParams.get('search_name');
                let defaultDisplay = profile.name || "Unknown";
                
                if (searchedName && (searchedName === profile.new_name || searchedName === profile.name)) {
                    defaultDisplay = searchedName;
                } else if (profile.new_name) {
                    defaultDisplay = profile.new_name;
                }
                
                window.currentPlayerName = defaultDisplay;

                const hasDualIdentity = profile.new_name && profile.name && (profile.new_name !== profile.name);
                const alterUsernameBtnHTML = hasDualIdentity ? 
                `<a class="dropdown-item" id="menu-alter-username" href="#" style="font-weight:normal; padding: .25rem 1.5rem; font-size:0.9em;"><i class="fas fa-exchange-alt" style="color:#6c757d!important;"></i><span style="color:#212529!important;">  Alter Username</span></a>` : "";

                document.getElementById('dynamic-profile-header').innerHTML = `
                    <h1 style="text-align: center; color: white; margin: 0; background: #ffffff52; padding: 10px; border-radius: 3px;">
                        <div style="position: relative;">
                            <a href="profile.html?uid=${profile.uid}" style="color: #ffffff; text-decoration:none;">
                                <img class="turnresults-avatar" src="avatar/${profile.uid}.webp" style="padding: 1px; box-shadow: 0px 0 3px 0px #3F51B5;" onerror="this.src='wiki.png';"><span id="header-display-name">${defaultDisplay}</span>
                            </a>
                            <div class="dropdown dropleft" id="headermenu">
                                <button class="btn btn-outline-light btn-sm" type="button" data-toggle="dropdown" style="opacity: 0.7;">
                                    <i class="fas fa-ellipsis-v"></i>
                                </button>
                                <div class="dropdown-menu">
                                  <a class="dropdown-item" id="copy-uid-btn" href="#">Copy User ID</a>
                                  ${alterUsernameBtnHTML}
                                </div>
                            </div>
                        </div>
                        <div class="uidlinks mt-2">
                            <a href="profile.html?uid=${profile.uid}">Profile</a>
                            <a href="friends.html?uid=${profile.uid}" class="uidlinks-active">Friends</a>
			    <a href="Search.html" target="_blank">Search</a>
                        </div>
                    </h1>
                `;
            }
        };
    } catch (err) { }

    // Friends Data
    try {
        const getSocial = localDB.transaction("social", "readonly").objectStore("social").get(targetUid);
        getSocial.onsuccess = () => {
            const socialData = getSocial.result;
            globalFriendsList = (socialData && socialData.friends) ? socialData.friends.map(f => ({
                uid: extractUid(f),
                name: extractName(f),
                new_name: extractNewName(f)
            })) :[];
            
            renderFriendsList(globalFriendsList);
        };
    } catch (err) { 
        renderFriendsList([]);
    }
}

// ============================================================================
// RENDER Y FILTRADO
// ============================================================================
function renderFriendsList(listaAmigos) {
    currentFilteredList = listaAmigos; 
    const wrapper = document.getElementById('friends-list-wrapper');
    if (listaAmigos.length === 0) {
        wrapper.innerHTML = '<div style="color:white; padding: 20px;">No results found.</div>';
        return;
    }

    let html = '';
    const fallBackImg = "this.onerror=null;this.src='wiki.png';"; // Fallback to root wiki logo

    listaAmigos.forEach(f => {
        const fUid = f.uid;
        const isAltered = showAlterNames && f.new_name && (f.new_name !== f.name);
        const displayFname = isAltered ? f.new_name : f.name;
        
        const badgeAltered = isAltered ? `<span class="altered-badge">ALTERED</span>` : '';
        const finalBadgesHTML = badgeAltered ? `<span style="margin-left:8px; vertical-align:middle;">${badgeAltered}</span>` : '';

        const secNameHtml = (f.new_name && f.new_name !== f.name) ? `<div style="font-size:0.8em; color:#333; font-weight:bold; margin-bottom: 2px;"> ${showAlterNames ? f.name : f.new_name}</div>` : '';
        const profileUrl = `profile.html?uid=${fUid}&search_name=${encodeURIComponent(displayFname)}`;

        html += `
        <div class="friendcard col-sm-12 col-md-6 col-lg-3">
            <img class="friend-avatar" src="avatar/${fUid}.webp" loading="lazy" onerror="${fallBackImg}" onclick="window.location.href='${profileUrl}'">
            <a href="${profileUrl}" class="friend-link" style="display: flex; align-items: center; justify-content: center;">
                <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%;">${displayFname}</span>
                ${finalBadgesHTML}
            </a>
            
            <div class="friend-tooltip">
                <div class="tt-name">${displayFname}</div>
                ${secNameHtml}
                <img class="tt-img" src="avatar/${fUid}.webp" loading="lazy" onerror="${fallBackImg}">
                <div class="tt-uid">uid=${fUid}</div>
            </div>
        </div>`;
    });
    wrapper.innerHTML = html;
    
    updateAlterNamesVisibility();
}

function updateAlterNamesVisibility() {
    const alterWrapper = document.getElementById('alter-names-wrapper');
    if (!alterWrapper) return;
    const hasNewNames = globalFriendsList.some(f => f.new_name && f.new_name !== f.name);
    alterWrapper.style.display = hasNewNames ? 'flex' : 'none';
}

// TOGGLES
document.getElementById('show-avatars-cb').addEventListener('change', function() {
    document.getElementById('friendscontainer').classList.toggle('show-avatars-mode', this.checked);
});

document.getElementById('alter-names-cb').addEventListener('change', function() {
    showAlterNames = this.checked;
    renderFriendsList(currentFilteredList);
});

document.getElementById('expanded-view-cb').addEventListener('change', function() {
    if (this.checked) {
        document.getElementById('big-view-cb').checked = false;
        document.getElementById('friendscontainer').classList.remove('big-view-mode');
    }
    document.getElementById('friendscontainer').classList.toggle('expanded-view-mode', this.checked);
});

document.getElementById('big-view-cb').addEventListener('change', function() {
    if (this.checked) {
        document.getElementById('expanded-view-cb').checked = false;
        document.getElementById('friendscontainer').classList.remove('expanded-view-mode');
    }
    document.getElementById('friendscontainer').classList.toggle('big-view-mode', this.checked);
});

// SEARCH INPUT
document.getElementById('da-search-input').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    const rawQuery = this.value.trim(); 
    const method = document.getElementById('da-search-method').value;

    if (rawQuery === '') {
        renderFriendsList(globalFriendsList);
        return;
    }

    searchTimeout = setTimeout(() => {
        if (method === 'name') {
            const queryAdv = advancedDecancer(rawQuery);
            if (advancedCache.length !== globalFriendsList.length) {
                advancedCache = globalFriendsList.map(f => advancedDecancer(f.name + " " + (f.new_name || "")));
            }

            if (window.OSINT_ENGINE && window.OSINT_ENGINE.ufuzzy) {
                let idxs = window.OSINT_ENGINE.ufuzzy.filter(advancedCache, queryAdv);
                let result =[];
                if (idxs && idxs.length > 0) {
                    for (let i = 0; i < idxs.length; i++) { result.push(globalFriendsList[idxs[i]]); }
                }
                renderFriendsList(result);
            } else {
                const filteredList = globalFriendsList.filter((f, i) => advancedCache[i].includes(queryAdv));
                renderFriendsList(filteredList);
            }
        } else if (method === 'uid') {
            const queryClean = rawQuery.toLowerCase();
            const filteredList = globalFriendsList.filter(f => f.uid.toLowerCase().includes(queryClean));
            renderFriendsList(filteredList);
        }
    }, 250); 
});

document.getElementById('da-search-method').addEventListener('change', function() {
    advancedCache =[]; 
    document.getElementById('da-search-input').dispatchEvent(new Event('input'));
});

// CLICKS MENUS Y ACCIONES
document.addEventListener('click', function(e) {
    const targetId = e.target.id || e.target.parentElement?.id;
    
    if (targetId === 'copy-uid-btn') {
        e.preventDefault();
        const uid = new URLSearchParams(window.location.search).get('uid');
        if (uid) {
            navigator.clipboard.writeText(uid).then(() => {
                const originalText = e.target.innerText;
                e.target.innerText = " Copied!";
                e.target.style.color = "#4CAF50";
                setTimeout(() => { e.target.innerText = originalText; e.target.style.color = ""; }, 1000);
            });
        }
        return;
    }
    
    if (targetId === 'menu-alter-username' || e.target.closest('#menu-alter-username')) {
        e.preventDefault();
        const p = window.currentPlayerProfile;
        if (!p || !p.new_name) return;
        
        const nameSpan = document.getElementById('header-display-name');
        const currentText = nameSpan.innerText;
        const nextText = (currentText === p.new_name) ? p.name : p.new_name;
        
        nameSpan.style.opacity = 0;
        setTimeout(() => {
            nameSpan.innerText = nextText;
            window.currentPlayerName = nextText; 
            nameSpan.style.opacity = 1;
            nameSpan.style.transition = "opacity 0.3s ease";
        }, 150);
        return;
    }
});

// NAVBAR SEARCH (GLOBAL)
$(function() {
    const input = $('#nav-search-input');
    const resultsBox = $('#search-results-dropdown');
    
    $('#search-clear-trash').on('click', function() {
        input.val('').focus();
        resultsBox.hide();
    });

    input.on('input', function() {
        const query = $(this).val().trim().toLowerCase();
        if (query.length < 2) { resultsBox.hide(); return; }

        if (!localDB) {
            indexedDB.open("DrawariaLiteDB", 2).onsuccess = (e) => {
                localDB = e.target.result;
                executeNavSearch(query, resultsBox);
            };
        } else {
            executeNavSearch(query, resultsBox);
        }
    });

    function executeNavSearch(query, resBox) {
        const matches = [];
        const store = localDB.transaction("profiles", "readonly").objectStore("profiles");

        store.openCursor().onsuccess = (ev) => {
            const c = ev.target.result;
            if (c && matches.length < 8) {
                const p = c.value;
                const oldNameMatch = p.name && p.name.toLowerCase().includes(query);
                const newNameMatch = p.new_name && p.new_name.toLowerCase().includes(query);
                const uidMatch = p.uid && p.uid.toLowerCase().includes(query);
                
                if (oldNameMatch || newNameMatch || uidMatch) {
                    let display_name = p.new_name || p.name || "Unknown";
                    let secondary_name = (p.new_name && p.name !== p.new_name) ? p.name : "";
                    matches.push({ ...p, display_name: display_name, secondary_name: secondary_name });
                }
                c.continue();
            } else {
                if (matches.length > 0) {
                    resBox.html(matches.map(p => {
                        const rDom = getDomain(p.uid);
                        return `
                        <div class="search-res-item" onclick="window.location.href='profile.html?uid=${p.uid}&search_name=${encodeURIComponent(p.display_name)}'">
                            <img src="${rDom}/avatar/${p.uid}.webp" onerror="this.onerror=null;this.src='wiki.png';" style="width:28px; height:28px; border-radius:4px; margin-right:10px; border:1px solid #3F51B5; object-fit:cover;">
                            <div>
                                <div style="font-weight:bold; color:white;">${p.display_name}</div>
                                ${p.secondary_name ? `<div style="font-size:0.7em; color:#ff9800;">AKA: ${p.secondary_name}</div>` : ''}
                                <div style="font-size:0.7em; color:#a0cfff;">UID: ${p.uid.substring(0,8)}...</div>
                            </div>
                        </div>`;
                    }).join('')).show();
                } else {
                    resBox.hide();
                }
            }
        };
    }

    $(document).on('click', (e) => {
        if (!$(e.target).closest('.search-box-wrapper').length) resultsBox.hide();
    });
});
</script>
